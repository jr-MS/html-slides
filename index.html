<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML Slides Portal</title>
  <style>
    :root{
      --bg:#0f172a;
      --bg2:#111827;
      --card:#111827cc;
      --card2:#1f2937cc;
      --ink:#e5e7eb;
      --muted:#9ca3af;
      --line:#334155;
      --accent:#38bdf8;
      --accent2:#a78bfa;
      --accent3:#34d399;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:22px;
      --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:var(--sans);color:var(--ink);
      background:
        radial-gradient(1200px 600px at 10% 0%, rgba(56,189,248,.15), transparent 55%),
        radial-gradient(1000px 560px at 100% 20%, rgba(167,139,250,.16), transparent 45%),
        radial-gradient(900px 500px at 50% 100%, rgba(52,211,153,.12), transparent 50%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height:100vh;
    }
    .shell{max-width:1180px;margin:0 auto;padding:40px 24px 72px;}
    .hero{
      padding:28px;border:1px solid rgba(255,255,255,.08);border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow:var(--shadow);backdrop-filter:blur(14px);
    }
    .badge{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(56,189,248,.12);color:#7dd3fc;border:1px solid rgba(125,211,252,.18);font-size:13px;font-weight:700}
    h1{font-size:46px;line-height:1.08;margin:16px 0 10px}
    .lead{font-size:18px;line-height:1.7;color:var(--muted);max-width:860px}
    .heroMeta{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px}
    .metaPill{padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#cbd5e1;font-size:14px}
    .toolbar{display:grid;grid-template-columns:1.4fr .7fr .7fr;gap:14px;margin:22px 0 18px}
    input,select{
      width:100%;padding:14px 16px;border-radius:16px;border:1px solid var(--line);
      background:rgba(15,23,42,.72);color:var(--ink);outline:none;font-size:15px;
    }
    .sectionTitle{display:flex;justify-content:space-between;align-items:center;margin:18px 0 14px;color:#cbd5e1}
    .count{font-size:14px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
    .card{
      display:flex;flex-direction:column;gap:14px;padding:18px;border-radius:22px;
      background:linear-gradient(180deg, rgba(17,24,39,.88), rgba(15,23,42,.88));
      border:1px solid rgba(255,255,255,.06);box-shadow:var(--shadow);
      transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .card:hover{transform:translateY(-4px);border-color:rgba(56,189,248,.34);box-shadow:0 28px 70px rgba(0,0,0,.42)}
    .toprow{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .kicker{display:flex;flex-wrap:wrap;gap:8px}
    .kicker span{font-size:12px;padding:6px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.08);color:#cbd5e1;background:rgba(255,255,255,.04)}
    .title{font-size:22px;font-weight:800;line-height:1.25}
    .desc{font-size:14px;line-height:1.7;color:var(--muted);min-height:72px}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tag{font-size:12px;padding:6px 9px;border-radius:999px;background:rgba(167,139,250,.12);color:#ddd6fe;border:1px solid rgba(167,139,250,.18)}
    .actions{margin-top:auto;display:flex;gap:10px;align-items:center}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;text-decoration:none;
      padding:11px 14px;border-radius:14px;background:linear-gradient(135deg, var(--accent), #60a5fa);
      color:#082f49;font-weight:800;border:none;
    }
    .ghost{background:rgba(255,255,255,.04);color:#e2e8f0;border:1px solid rgba(255,255,255,.08)}
    .empty{padding:30px;border:1px dashed rgba(255,255,255,.12);border-radius:18px;color:var(--muted);text-align:center}
    footer{margin-top:26px;color:var(--muted);font-size:13px}
    @media (max-width: 820px){
      .toolbar{grid-template-columns:1fr}
      h1{font-size:34px}
      .shell{padding:28px 16px 44px}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="badge">HTML Slides Portal</span>
      <h1>Slides 首页索引</h1>
      <p class="lead">这里集中管理所有 HTML slide。你可以按分类浏览、按关键词搜索，然后直接打开对应页面，把链接发给同事即可。当前这版先全部公开，后面如果你要做受保护内容，可以再拆成公开站和受保护站。</p>
      <div class="heroMeta">
        <div class="metaPill">公开方式：GitHub Pages</div>
        <div class="metaPill">内容类型：HTML Slides</div>
        <div class="metaPill">索引能力：分类 + 搜索</div>
      </div>
    </section>

    <section>
      <div class="toolbar">
        <input id="search" type="search" placeholder="搜索标题、描述、标签，例如：OpenClaw / 团队分享 / 归档" />
        <select id="categoryFilter">
          <option value="all">全部分类</option>
        </select>
        <select id="audienceFilter">
          <option value="all">全部类型</option>
          <option value="team">团队分享</option>
          <option value="internal">内部/归档</option>
        </select>
      </div>
      <div class="sectionTitle">
        <strong>可访问的 Slides</strong>
        <span id="count" class="count"></span>
      </div>
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" hidden>当前筛选条件下没有结果，可以换个关键词试试。</div>
    </section>

    <footer>
      维护方式：新增 slide 时，把 HTML 放进 <code>slides/</code>，然后在 <code>slides.json</code> 里补一条元数据即可。
    </footer>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    const search = document.getElementById('search');
    const categoryFilter = document.getElementById('categoryFilter');
    const audienceFilter = document.getElementById('audienceFilter');

    const audienceLabel = { team: '团队分享', internal: '内部/归档' };

    function norm(v){ return String(v || '').toLowerCase(); }

    function card(item){
      const tags = (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      const top = `
        <div class="toprow">
          <div class="kicker">
            <span>${item.category}</span>
            <span>${audienceLabel[item.audience] || item.audience}</span>
            <span>${item.visibility === 'public' ? '公开' : '受保护'}</span>
          </div>
          ${item.featured ? '<span class="kicker"><span>推荐</span></span>' : ''}
        </div>`;
      return `
        <article class="card">
          ${top}
          <div class="title">${item.title}</div>
          <div class="desc">${item.description}</div>
          <div class="tags">${tags}</div>
          <div class="actions">
            <a class="btn" href="${item.path}" target="_blank" rel="noopener noreferrer">打开 Slide</a>
            <a class="btn ghost" href="${item.path}">当前页打开</a>
          </div>
        </article>`;
    }

    function render(items){
      grid.innerHTML = items.map(card).join('');
      empty.hidden = items.length > 0;
      count.textContent = `共 ${items.length} 个结果`;
    }

    fetch('./slides.json')
      .then(r => r.json())
      .then(items => {
        const categories = [...new Set(items.map(i => i.category))].sort();
        for(const c of categories){
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c; categoryFilter.appendChild(opt);
        }

        function apply(){
          const q = norm(search.value.trim());
          const c = categoryFilter.value;
          const a = audienceFilter.value;
          const filtered = items.filter(item => {
            const hay = norm([item.title, item.description, item.category, item.audience, item.visibility, ...(item.tags || [])].join(' '));
            const matchQ = !q || hay.includes(q);
            const matchC = c === 'all' || item.category === c;
            const matchA = a === 'all' || item.audience === a;
            return matchQ && matchC && matchA;
          }).sort((x, y) => Number(y.featured) - Number(x.featured) || x.title.localeCompare(y.title, 'zh-CN'));
          render(filtered);
        }

        [search, categoryFilter, audienceFilter].forEach(el => el.addEventListener('input', apply));
        [categoryFilter, audienceFilter].forEach(el => el.addEventListener('change', apply));
        apply();
      })
      .catch(err => {
        grid.innerHTML = `<div class="empty">读取 slides.json 失败：${err.message}</div>`;
        empty.hidden = true;
        count.textContent = '加载失败';
      });
  </script>
</body>
</html>
